name: pyathena
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - pip
  - jupyter
  - yt>=4.4
  - h5py
  - matplotlib
  - numpy>=2.0
  - scipy
  - astropy
  - pandas
  - xarray
  - dask
  - netCDF4
  - healpy
  - cmasher
  - cmocean
  - jupyter-book
  - docutils==0.17.1
  - pip:
    - tqdm
    - periodictable
    - inherit_docstring
